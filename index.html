<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Para Alison ❤️</title>

<style>

body{
margin:0;
padding:0;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family: Arial;
text-align:center;
color:white;
overflow:hidden;
}

.container{
margin-top:80px;
}

h1{
font-size:45px;
}

p{
font-size:22px;
max-width:600px;
margin:auto;
}

img{
width:250px;
border-radius:20px;
margin-top:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

button{
margin-top:30px;
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

.heart{
position: fixed;
top:-10px;
color:red;
animation: fall linear forwards;
}

@keyframes fall{
to{
transform: translateY(100vh);
}
}

</style>

</head>

<body>

<div class="container">

<h1> Meu Ali ❤️</h1>

<img src="IMG_5903.png">
<img src="IMG_3723.png">
<img src="IMG_3932.jpeg">
  
<p>
Estamos juntos há quase <b>2 anos</b> e cada momento ao seu lado faz minha vida mais feliz.
</p>

<p>
Obrigada por ser meu amor, meu companheiro e por fazer minha vida mais bonita.
Eu te amo muito! feliz nosso dia! ❤️
</p>

<button onclick="mensagem()">Clique aqui</button>

</div>

<script>

function mensagem(){
alert("Alison, obrigada por esses quase 2 anos incríveis. Eu te amo muito ❤️");
}

function criarCoracao(){
const heart = document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);
}

setInterval(criarCoracao,300);

</script>

</body>
</html>
